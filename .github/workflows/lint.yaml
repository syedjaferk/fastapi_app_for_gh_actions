name: Python Lint Check

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest # Runner.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run Linter
        run: flake8 .
